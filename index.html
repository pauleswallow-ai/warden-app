<script>
    // ... (Keep existing Map Setup & getDirectImgUrl) ...

    // NEW: Function to find the Postcode District for a new marker
    async function getDistrict(lat, lon) {
        try {
            const response = await fetch(`https://api.postcodes.io/postcodes?lon=${lon}&lat=${lat}`);
            const data = await response.json();
            if (data.status === 200 && data.result) {
                // Returns the outward code, e.g., "ST15"
                return data.result[0].outcode;
            }
            return "UK"; // Fallback if no postcode found
        } catch (error) {
            return "UK";
        }
    }

    Papa.parse(sheetURL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            results.data.forEach(row => {
                // Logic for displaying the Global ID
                const globalID = row.route_id || "PENDING";
                const pointID = row.point_id ? `-${row.point_id}` : "";
                
                L.marker([row.latitude, row.longitude], {icon: wardenIcon}).addTo(map)
                    .bindPopup(`
                        <div class="marker-label">
                            <div class="route-header">${globalID}${pointID}</div><br>
                            <b>${row.nickname || "Marker"}</b><br>
                            <small>${row.route_name || "Local Path"}</small>
                            <hr>
                            <button onclick="checkLocation(${row.latitude}, ${row.longitude})" class="nav-btn">Check District</button>
                        </div>
                    `);
            });
        }
    });

    // Helper for your test: Click a button to see the District ID
    async function checkLocation(lat, lon) {
        const district = await getDistrict(lat, lon);
        alert(`This marker is in District: ${district}\nSuggested ID: ${district}-001`);
    }
</script>
