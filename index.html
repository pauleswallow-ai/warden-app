<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warden Global Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #f8f9fa; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
        .marker-label { font-family: sans-serif; padding: 5px; min-width: 180px; }
        .route-header { background: #2c3e50; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 5px; }
        .marker-photo { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; margin-top: 8px; display: block; background: #eee; }
        .nav-btn { background: #28a745; color: white !important; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; text-decoration: none; display: block; text-align: center; font-size: 14px; }
        .road-btn { background: #4285F4; }
        .warden-icon { border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); background: white; }
        
        #capture-btn { 
            position: absolute; top: 80px; right: 10px; z-index: 1000;
            background: #d9534f; color: white; border: 2px solid white;
            padding: 12px 18px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;
            font-family: sans-serif; font-size: 14px;
        }
        #capture-btn:disabled { background: #888; }
    </style>
</head>
<body>

<button id="capture-btn" onclick="captureLocation()">📍 Save Point</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([52.906, -2.148], 15);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.locate({ position: 'topright', keepCurrentZoomLevel: true, flyTo: true }).addTo(map);

    // --- PASTE YOUR URL HERE ---
    const WEB_APP_URL = "PASTE_YOUR_URL_HERE";

    const wardenIcon = L.icon({
        iconUrl: 'https://lh3.googleusercontent.com/d/1bpzkwUUr2CC_hx1A1-Y_6dzYfobFHsED', 
        iconSize: [35, 35], iconAnchor: [17, 17], popupAnchor: [0, -17], className: 'warden-icon'
    });
async function captureLocation() {
        const btn = document.getElementById('capture-btn');
        btn.innerText = "Saving...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const payload = { 
                lat: pos.coords.latitude, 
                lng: pos.coords.longitude, 
                nickname: "Field Capture" 
            };

            try {
                // We use no-cors and no headers to bypass the "Completed but no data" bug
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload) 
                });
                
                alert("Location Sent! Checking Sheet...");
                setTimeout(() => { location.reload(); }, 2500); 

            } catch (err) {
                alert("App Error: " + err);
                btn.innerText = "📍 Save Point";
                btn.disabled = false;
            }
        }, (err) => {
            alert("GPS Error: " + err.message);
            btn.innerText = "📍 Save Point";
            btn.disabled = false;
        }, { enableHighAccuracy: true });
    }

    const sheetURL = "https://script.google.com/macros/s/AKfycby4dmmiO0p_t9zsJWdatPg32yZ9tw-GHVCYENnUvzeb2styDeRvfhQGgLWcWVXDnYbH/exec";

    Papa.parse(sheetURL, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            const routes = {};
            results.data.forEach(row => {
                const lat = parseFloat(String(row.latitude || "").trim());
                const lon = parseFloat(String(row.longitude || "").trim());
                const rID = row.route_id || "Unknown";

                if(!isNaN(lat) && !isNaN(lon)) {
                    if (!routes[rID]) routes[rID] = [];
                    routes[rID].push([lat, lon]);

                    L.marker([lat, lon], {icon: wardenIcon}).addTo(map)
                        .bindPopup(`<div class="marker-label"><div class="route-header">${rID}</div><br><b>${row.nickname || "Waypoint"}</b></div>`);
                }
            });

            Object.keys(routes).forEach(id => {
                if (routes[id].length > 1) {
                    L.polyline(routes[id], { color: '#FFD700', weight: 5, dashArray: '10, 15' }).addTo(map);
                }
            });
        }
    });
</script>
</body>
</html>
