<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warden Global Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; background: #f8f9fa; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
        .marker-label { font-family: -apple-system, sans-serif; padding: 5px; min-width: 180px; }
        .route-header { background: #2c3e50; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 5px; }
        .marker-photo { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; margin-top: 8px; display: block; background: #eee; }
        .nav-btn { background: #28a745; color: white !important; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; text-decoration: none; display: block; text-align: center; font-size: 14px; }
        .road-btn { background: #4285F4; }
        .warden-icon { border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); background: white; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.locatecontrol/dist/L.Control.Locate.min.js"></script>

<script>
    const map = L.map('map', { zoomControl: false }).setView([52.906, -2.148], 15);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    L.control.locate({ position: 'topright', keepCurrentZoomLevel: true, flyTo: true }).addTo(map);

    const wardenIcon = L.icon({
        iconUrl: 'https://lh3.googleusercontent.com/d/1bpzkwUUr2CC_hx1A1-Y_6dzYfobFHsED', 
        iconSize: [35, 35], iconAnchor: [17, 17], popupAnchor: [0, -17], className: 'warden-icon'
    });

    function getDirectImgUrl(url) {
        if (!url || !url.includes("drive.google.com")) return url || "";
        const fileId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
        return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w500` : url;
    }

    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTi5YTVr6GkWiJgxhgAh6aZE2ShkxuLx6RfkZ6ncjIemdpgJZrVfak3rN2DuENZsdQL0wk5GDMhMAav/pub?output=csv";

    Papa.parse(sheetURL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            // New Object to group points by Route ID
            const routes = {};

            results.data.forEach(row => {
                const lat = parseFloat(String(row.latitude || "").trim());
                const lon = parseFloat(String(row.longitude || "").trim());
                const rID = row.route_id || "Unknown";

                if(!isNaN(lat) && !isNaN(lon)) {
                    const pos = [lat, lon];
                    
                    // Grouping logic for the lines
                    if (!routes[rID]) routes[rID] = [];
                    routes[rID].push(pos);

                    // Marker Logic
                    const pointID = row.point_id ? `-${row.point_id}` : "";
                    const fullRouteDisplay = (row.route_name || "Path") + (row.route_nickname ? ` (${row.route_nickname})` : "");
                    const photoHtml = row.photo ? `<img src="${getDirectImgUrl(row.photo)}" class="marker-photo">` : "";

                    L.marker(pos, {icon: wardenIcon}).addTo(map)
                        .bindPopup(`
                            <div class="marker-label">
                                <div class="route-header">${rID}${pointID}</div><br>
                                <b style="font-size: 16px;">${row.nickname || "Waypoint"}</b><br>
                                <small style="color: #666;">${fullRouteDisplay}</small>
                                ${photoHtml}
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving" target="_blank" class="nav-btn road-btn">Road Nav</a>
                            </div>
                        `);
                }
            });

            // Draw separate lines for each Route ID
            Object.keys(routes).forEach(id => {
                if (routes[id].length > 1) {
                    L.polyline(routes[id], { 
                        color: '#FFD700', 
                        weight: 5, 
                        opacity: 0.8, 
                        dashArray: '10, 15',
                        lineJoin: 'round'
                    }).addTo(map);
                }
            });
        }
    });
</script>

</body>
</html>
