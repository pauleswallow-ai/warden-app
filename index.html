<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Warden Pilot</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Force the map to actually show on the screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .marker-label { font-family: sans-serif; padding: 5px; }
        .nav-btn { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    // 1. Initialize Map
    const map = L.map('map').setView([52.906, -2.148], 14);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 2. Locate Me Button (The Blue Dot)
    map.locate({setView: true, maxZoom: 16});
    function onLocationFound(e) {
        L.circle(e.latlng, e.accuracy / 2).addTo(map).bindPopup("You are here").openPopup();
    }
    map.on('locationfound', onLocationFound);

    // 3. YOUR DATA SOURCE
    // Ensure this link ends with 'output=csv'
    const sheetURL = "PASTE_YOUR_PUBLISHED_CSV_LINK_HERE";

    Papa.parse(sheetURL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            results.data.forEach(marker => {
                // We check for Latitude (case sensitive!)
                if(marker.Latitude && marker.Longitude) {
                    L.marker([parseFloat(marker.Latitude), parseFloat(marker.Longitude)])
                        .addTo(map)
                        .bindPopup(`
                            <div class="marker-label">
                                <b>${marker.Nickname || 'Marker'}</b><br>
                                <i>${marker.what3words}</i>
                                <button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${marker.Latitude},${marker.Longitude}')">
                                    Get Directions
                                </button>
                            </div>
                        `);
                }
            });
        }
    });
</script>

</body>
</html>
