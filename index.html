<!DOCTYPE html>
<html>
<head>
    <title>Warden</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 60vh; width: 100%; }
        .controls { padding: 15px; background: white; border-top: 2px solid #2ecc71; }
        .preview-box { background: #e8f5e9; padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #c8e6c9; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background-color: #27ae60; }
        label { font-size: 12px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <div class="preview-box">
        <strong>Naming Preview:</strong> <span id="display-name" style="color: #27ae60;">ST15-???</span>
    </div>

    <label>Route ID (Col A)</label>
    <input type="text" id="route-id" placeholder="e.g. ST15-001" oninput="updatePreview()">

    <label>Nickname (Col G)</label>
    <input type="text" id="nickname" placeholder="e.g. Broken Gate" oninput="updatePreview()">

    <label>Is this a Fork? (Col J)</label>
    <select id="is-fork" onchange="updatePreview()">
        <option value="NO">NO</option>
        <option value="YES">YES</option>
    </select>

    <button onclick="getLocationAndSave()">SAVE POINT TO SHEET</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. SETTINGS ---
    // PASTE YOUR GOOGLE WEB APP URL HERE:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw7yJyU-8uG_Mly8TEkHoE8Icjr8qRDvkZaeQAaFKU360E_lszic5XMjRXes1UYiYzB/exec";

    const map = L.map('map').setView([52.9064, -2.1485], 13); // Centered on Stone
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker;

    // --- 2. THE PREVIEW ENGINE ---
    function updatePreview() {
        const routeId = document.getElementById('route-id').value || "ST15-???";
        const nickname = document.getElementById('nickname').value;
        const isFork = document.getElementById('is-fork').value;

        let name = nickname ? nickname + " (" + routeId + ")" : routeId;
        if (isFork === "YES") {
            name = "[FORK] " + name;
        }
        document.getElementById('display-name').innerText = name;
        return name;
    }

    // --- 3. THE TRANSMITTER ---
    function getLocationAndSave() {
        if (!navigator.geolocation) {
            alert("Geolocation is not supported by your browser");
            return;
        }

        const btn = document.querySelector('button');
        btn.innerText = "SAVING...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition((position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            // Show on map
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 16);

            const payload = {
                routeId: document.getElementById('route-id').value,
                nickname: document.getElementById('nickname').value,
                isFork: document.getElementById('is-fork').value,
                lat: lat,
                lng: lng
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Saved: " + document.getElementById('display-name').innerText);
                btn.innerText = "SAVE POINT TO SHEET";
                btn.disabled = false;
            })
            .catch(err => {
                alert("Error: " + err);
                btn.disabled = false;
            });
        });
    }
</script>

</body>
</html>
